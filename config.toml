DefaultContentLanguage = "en"
DefaultContentLanguageInSubdir = true
baseURL = "https://correlationoucausalite.github.io"
languageCode = "fr"
publishDir = "public"
theme = "blist"
title = "My New Hugo Site"
[build]
writeStats = true
[languages.en]
contentDir = "content/en"
languageName = "English"
weight = 1
[[languages.en.menu.main]]
name = "Blog"
url = "blog"
weight = 1
[[languages.en.menu.main]]
name = "About"
url = "page/about/"
weight = 2
[[languages.en.menu.main]]
name = "Tags"
url = "tags"
weight = 3
[[languages.en.menu.main]]
name = "Top Post"
url = "/en/blog/emoji-support/"
weight = 4
[languages.en.params]
introPhoto = "/picture.jpg"
introSubtitle = "26 y/o junior developer who enjoys social card games, blogging and painting"
introTitle = "Hey! I'm Katheryn Fox"
logo = "/blist-logo.png"
[languages.fr]
contentDir = "content/fr"
languageName = "Français"
weight = 1
[[languages.fr.menu.main]]
name = "Blog"
url = "blog"
weight = 1
[[languages.fr.menu.main]]
name = "À propos"
url = "page/about/"
weight = 2
[[languages.fr.menu.main]]
name = "Tags"
url = "tags"
weight = 3
[languages.fr.params]
introPhoto = "/picture.jpg"
introSubtitle = "Développeuse junior de 26 ans qui adore les jeux de société, le blogging et la peinture"
introTitle = "Salut! Je suis Katheryn Fox"
logo = "/blist-logo.png"
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
style = "dracula"
[[menu.main]]
name = "About"
url = "/about"
weight = 1
[outputs]
home = ["HTML", "RSS", "JSON"]
[params]
ascentColor = "bg-blue-100"
copyright = "Copyright © 2021 - Katheryn Fox · All rights reserved"
darkModeToggle = true
enableSearch = true
favicon = "/favicon.svg"
frontBundle = "blog"
hideMeta = false
hideOtherLanguages = false
[params.homepage.social]
description = "I work on everything coding and tweet developer memes"
dribbble = "https://dribbble.com/"
